name: Release

on:
  workflow_dispatch:
    inputs:
      buildOnly:
        description: "Build the Windows NSIS installer without creating or uploading release assets"
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  release:
    name: Build Windows NSIS
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-rs -> target"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri bundle only
        if: github.event_name == 'workflow_dispatch' && inputs.buildOnly == true
        run: >
          bun run tauri build
          --bundles nsis
          --config '{"bundle":{"createUpdaterArtifacts":false}}'
          --ci
          --no-sign

      - name: Build and publish Tauri release
        if: github.event_name != 'workflow_dispatch' || inputs.buildOnly != true
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: bun run tauri
          args: --bundles nsis
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          tagName: v__VERSION__
          releaseName: "Radianite v__VERSION__"
          releaseBody: "See the assets to download and install this version. The in-app updater uses the attached latest.json metadata."
          releaseDraft: true
          prerelease: false
          releaseAssetNamePattern: "[name]_[version]_[platform]_[arch].[ext]"

      - name: Upload stable Windows installer alias
        if: github.event_name != 'workflow_dispatch' || inputs.buildOnly != true
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $installer = Get-ChildItem "src-rs/target/release/bundle/nsis" -Filter "*.exe" -File |
            Select-Object -First 1
          if ($null -eq $installer) {
            throw "NSIS installer was not found"
          }

          $alias = Join-Path $env:RUNNER_TEMP "Radianite-Windows-Setup.exe"
          Copy-Item -LiteralPath $installer.FullName -Destination $alias -Force
          gh release upload "v$version" $alias --clobber
