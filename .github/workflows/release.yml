name: Release

on:
  workflow_dispatch:
    inputs:
      buildOnly:
        description: "Build the Windows NSIS installer without creating or uploading release assets"
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  release:
    name: Build Windows NSIS
    runs-on: windows-latest

    permissions:
      contents: write
      models: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-rs -> target"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Generate AI release notes
        id: release_notes
        if: github.event_name != 'workflow_dispatch' || inputs.buildOnly != true
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
        run: |
          bun scripts/generate-release-notes.mjs
          "body<<RELEASE_NOTES_EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Get-Content release-notes.md | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "RELEASE_NOTES_EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build Tauri bundle only
        if: github.event_name == 'workflow_dispatch' && inputs.buildOnly == true
        run: >
          bun run tauri build
          --bundles nsis
          --config '{"bundle":{"createUpdaterArtifacts":false}}'
          --ci
          --no-sign

      - name: Build and publish Tauri release
        if: github.event_name != 'workflow_dispatch' || inputs.buildOnly != true
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: bun run tauri
          args: --bundles nsis
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          tagName: v__VERSION__
          releaseName: "Radianite v__VERSION__"
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          assetNamePattern: "[name]_[version]_[platform]_[arch].[ext]"
